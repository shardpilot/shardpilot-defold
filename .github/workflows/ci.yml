name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shell syntax
        run: bash -n scripts/*.sh

      - name: Static library checks
        run: ./scripts/check_library.sh

      - name: Lua tests
        run: |
          if command -v lua >/dev/null 2>&1; then
            lua test/test_sdk.lua
          else
            echo "lua not available; static checks completed"
          fi
