name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shell syntax
        run: bash -n scripts/*.sh

      - name: Static library checks
        run: ./scripts/check_library.sh

      - name: Install Lua 5.4
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4

      - name: Lua tests
        run: lua5.4 test/test_sdk.lua

      - name: Lua crash tests
        run: lua5.4 test/test_crash.lua
